name: Boom

on:
  push:
    branches:
    - master
  pull_request:
    branches:
    - master
  schedule:
  - cron: "*/12 * * * *"

jobs:
  boooooom:
    name: Boooooom
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
      with:
          fetch-depth: 1
    - name: Install Dependencies
      run: |
          ip=$(curl -s https://api.ip.sb/ip -A Mozilla)
          echo $RANDOM+$ip > god
    - uses: stefanzweifel/git-auto-commit-action@v4
      with:
        commit_message: 'fox: Update god [skip ci]'
        branch: master
        commit_user_name: HelloTools-Bot
        commit_user_email: 3356136957@qq.com
        commit_author: HelloTools-Bot <3356136957@qq.com>
